schema: groundwork_validation_policy/v1
templates:
  documentation:
    match:
      files: ["**/*.md", "AGENTS.md", "MEMORY.md"]
    required: []
    landing_risk_floor: low
  go:
    match:
      files: ["**/*.go"]
    required:
      - name: go_tests
        command: "go test ./..."
  web:
    # The embedded SPA lives under web/ (Vite; built to static assets, go:embed'd).
    match:
      files: ["web/**"]
    required:
      - name: web_build
        command: "npm --prefix web ci && npm --prefix web run build"
    landing_risk_floor: low
