schema: groundwork_trust_policy/v1
auto_approve:
  - id: internal_docs
    description: Allow documentation-only changes to internal agent guidance.
    when:
      files:
        - AGENTS.md
        - MEMORY.md
        - ".groundwork/**/*.md"
      change_type: documentation
      max_diff_lines: 200
# allow_claim authorizes an actor to claim a node; the scheduler dispatches a node
# only when a rule here matches an AI actor. Phase 7 dogfood (Web UI, T-1036): the
# coding agent is authorized to EXECUTE implementation/test/docs leaves at bounded
# risk. This is only the first gate — the active envelope on the work's root
# (ADR 0056) is the second: it scopes claims to that subtree, its file scope, and
# its risk ceiling. So this rule opens the door; the envelope bounds the room.
# Planning/decompose and review are deliberately NOT authorized yet — held until the
# technical implementation agent is proven, then loosened the same way.
allow_claim:
  - id: codex_impl_medium
    description: Coding agent may execute implementation/test/docs leaves at bounded risk; the root envelope scopes it to a subtree.
    when:
      actor_ids: [ai.coding.codex]
      work_types: [technical_implementation, test_implementation, documentation]
      risk_class_at_most: medium
    actions: [execute]
require_human:
  - id: secrets
    when:
      files:
        - "**/.env*"
        - "**/*secret*"
  - id: landing_to_main_v1
    when:
      action_types: [land_to_main]
  - id: decomposition_v1
    when:
      action_types: [decompose]
